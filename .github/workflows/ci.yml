name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual runs from the Actions UI.
  workflow_dispatch:

# Cancel in-progress runs of this workflow on the same ref when a new commit
# arrives. Saves runner minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Required by dorny/test-reporter to write a check run with the test summary.
  checks: write
  pull-requests: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_VERSION: '10.0.x'

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore RollerGraph.slnx

      - name: Build
        run: dotnet build RollerGraph.slnx --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test RollerGraph.slnx
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ${{ github.workspace }}/test-results

      - name: Publish test results to PR
        uses: dorny/test-reporter@v2
        # Don't fail the build if the reporter step itself errors (e.g. on
        # forked-PR runs where it lacks permissions).
        if: always()
        with:
          name: Tests (${{ matrix.os }})
          path: test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload TRX files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/**/*.trx
          retention-days: 14
